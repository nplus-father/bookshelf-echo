name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Jib builds one image per app module and pushes:
      #   ghcr.io/nplus-father/ai-radar-{producers,enricher,digester,publisher}
      - name: Build & push all images with Jib
        run: |
          chmod +x gradlew
          ./gradlew jib

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            cd ~/workspace/ai-radar
            echo "$GHCR_TOKEN" | docker login ghcr.io -u andrewnplus --password-stdin
            git pull --ff-only
            docker compose pull producers enricher digester publisher
            docker compose up -d producers enricher digester publisher
            docker image prune -f
            echo "ai-radar deploy completed at $(date)"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
