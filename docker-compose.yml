# Local/host stack for bookshelf-echo. Zero-inbound posture (ADR-006): every port
# binds to 127.0.0.1 only — the pipeline needs egress exclusively, the public
# face is the statically built site on GitHub Pages.
name: bookshelf-echo

# Docker 預設的 json-file 沒有大小上限,log 只會單調成長,永遠不會自己回收。
# 這台 host 沒有 /etc/docker/daemon.json 且 sudo 需要密碼,全域設不了,
# 只能逐服務掛 —— 而且要容器重建才生效,單純 restart 不會套用。
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  rabbitmq:
    image: rabbitmq:4-management
    logging: *default-logging
    container_name: bookshelf-echo-rabbitmq
    ports:
      - "127.0.0.1:${RABBITMQ_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-airadar}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?set in .env}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./config/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./config/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    # Docker's 1024 default makes RabbitMQ log "Available file handles: 1024.
    # Please consider increasing system limits" on every boot; 65536 is the
    # documented production floor.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [default, infra-shared]   # infra-shared so Prometheus can scrape :15692

  postgres:
    image: postgres:17
    logging: *default-logging
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-airadar}
      POSTGRES_USER: ${POSTGRES_USER:-airadar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airadar} -d ${POSTGRES_DB:-airadar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  flyway:
    image: flyway/flyway:11
    logging: *default-logging
    command: migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-airadar}
      FLYWAY_USER: ${POSTGRES_USER:-airadar}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - ./db/migrations:/flyway/sql:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ---- pipeline apps (JVM, Jib images) ---------------------------------------
  # Each joins the bookshelf-echo default net (to reach postgres/rabbitmq by name) and
  # the external infra-shared-network (so infra-prometheus can scrape its
  # 127.0.0.1-free metrics port). Config comes from .env; the vars below override
  # it for in-container networking. Metrics ports are NOT published to the host —
  # zero-inbound (ADR-006) is preserved.
  #
  # The *_PORT vars in .env are HOST bindings and may be remapped to dodge a
  # conflict; inside the network each service always listens on its stock port,
  # so they are pinned here rather than inherited from .env.
  producers:
    image: ${BOOKSHELF_ECHO_PRODUCERS_IMAGE:-ghcr.io/nplus-father/bookshelf-echo-producers:latest}
    logging: *default-logging
    container_name: bookshelf-echo-producers
    env_file: [.env]
    environment: &app-env
      DATABASE_URL: jdbc:postgresql://${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-airadar}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_MGMT_PORT: "15672"
      METRICS_BIND: 0.0.0.0
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      flyway: { condition: service_completed_successfully }
    restart: unless-stopped
    networks: [default, infra-shared]

  enricher:
    image: ${BOOKSHELF_ECHO_ENRICHER_IMAGE:-ghcr.io/nplus-father/bookshelf-echo-enricher:latest}
    logging: *default-logging
    container_name: bookshelf-echo-enricher
    env_file: [.env]
    environment: *app-env
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      flyway: { condition: service_completed_successfully }
    restart: unless-stopped
    networks: [default, infra-shared]

  # Resonance gate (ADR-010): needs library-bridge on infra-shared-network
  # (the nplus-infra stack). Outbound HTTP only — zero-inbound holds.
  matcher:
    image: ${BOOKSHELF_ECHO_MATCHER_IMAGE:-ghcr.io/nplus-father/bookshelf-echo-matcher:latest}
    logging: *default-logging
    container_name: bookshelf-echo-matcher
    env_file: [.env]
    environment: *app-env
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      flyway: { condition: service_completed_successfully }
    restart: unless-stopped
    networks: [default, infra-shared]

  digester:
    image: ${BOOKSHELF_ECHO_DIGESTER_IMAGE:-ghcr.io/nplus-father/bookshelf-echo-digester:latest}
    logging: *default-logging
    container_name: bookshelf-echo-digester
    env_file: [.env]
    environment: *app-env
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      flyway: { condition: service_completed_successfully }
    restart: unless-stopped
    networks: [default, infra-shared]

  publisher:
    image: ${BOOKSHELF_ECHO_PUBLISHER_IMAGE:-ghcr.io/nplus-father/bookshelf-echo-publisher:latest}
    logging: *default-logging
    container_name: bookshelf-echo-publisher
    env_file: [.env]
    environment:
      <<: *app-env
      CONTENT_DIR: /app/content        # host .env points at an absolute host path
    volumes:
      - ./out/content:/app/content     # daily/weekly markdown persists on the host
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      flyway: { condition: service_completed_successfully }
    restart: unless-stopped
    networks: [default, infra-shared]

  # ---- site auto-publisher --------------------------------------------------
  # Syncs the publisher's markdown into the sibling bookshelf-echo-site checkout and
  # pushes it, so GitHub Actions rebuilds the public Astro site
  # (nplus.wiki/bookshelf-echo-site). Keeps the JRE publisher image git-free.
  site-publisher:
    image: alpine/git
    logging: *default-logging
    # Run as andrew (host uid:gid 1000) so git objects written into the bind-mounted
    # /repo/.git stay host-owned. As root the sidecar produced root:root objects that
    # broke `git fetch`/`rebase` from the host shell (insufficient permission). uid 1000
    # has no /etc/passwd entry in alpine/git, so HOME must point at a writable dir or
    # `git config --global` (below) can't write ~/.gitconfig.
    user: "1000:1000"
    entrypoint: ["/bin/sh", "/scripts/site-publish.sh"]
    volumes:
      - ./out/content:/src:ro
      - ../bookshelf-echo-site:/repo
      - ./config/site-publish.sh:/scripts/site-publish.sh:ro
    environment:
      HOME: /tmp
      SITE_GIT_TOKEN: ${SITE_GIT_TOKEN:?set in .env}
      SYNC_INTERVAL_SECONDS: "300"
    depends_on:
      - publisher
    restart: unless-stopped

  # Postgres 指標 —— 這個 DB 裝著 essays、llm_usage、items,是整條 pipeline
  # 唯一的持久狀態,卻一直沒有任何 exporter。連線數、交易速率、資料庫大小
  # 都看不到,只有 cAdvisor 的容器層 CPU/記憶體。
  #
  # 同時掛兩個網路:postgres 只在本 stack 的 default 網路,而 Prometheus 在
  # infra-shared-network,這個 exporter 是唯一的橋。
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter
    container_name: bookshelf-echo-postgres-exporter
    logging: *default-logging
    restart: unless-stopped
    environment:
      # 刻意不用 DATA_SOURCE_NAME 的單一 URL 形式:密碼含 "/" 之類的字元會讓
      # URL 解析失敗,而 exporter 的錯誤訊息會把完整 DSN（含密碼）印進 log。
      # 拆成三個變數就沒有編碼問題,也不會有人需要在 compose 裡手動 urlencode。
      DATA_SOURCE_URI: "${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-airadar}?sslmode=disable"
      DATA_SOURCE_USER: "${POSTGRES_USER:-airadar}"
      DATA_SOURCE_PASS: "${POSTGRES_PASSWORD:?set in .env}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - infra-shared

volumes:
  rabbitmq-data:
  pg-data:

networks:
  # bookshelf-echo's own bridge (auto-created as bookshelf-echo_default) is referenced as
  # `default`; infra-shared-network is created by the nplus-infra stack.
  infra-shared:
    name: infra-shared-network
    external: true
