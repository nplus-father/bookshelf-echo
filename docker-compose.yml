# Local/host stack for ai-radar. Zero-inbound posture (ADR-006): every port
# binds to 127.0.0.1 only — the pipeline needs egress exclusively, the public
# face is the statically built site on GitHub Pages.
name: ai-radar

services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: ai-radar-rabbitmq
    ports:
      - "127.0.0.1:${RABBITMQ_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-airadar}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?set in .env}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./config/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [default, infra-shared]   # infra-shared so Prometheus can scrape :15692

  postgres:
    image: postgres:17
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-airadar}
      POSTGRES_USER: ${POSTGRES_USER:-airadar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airadar} -d ${POSTGRES_DB:-airadar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  flyway:
    image: flyway/flyway:11
    command: migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-airadar}
      FLYWAY_USER: ${POSTGRES_USER:-airadar}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - ./db/migrations:/flyway/sql:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ---- pipeline apps (JVM, Jib images) ---------------------------------------
  # Each joins the ai-radar default net (to reach postgres/rabbitmq by name) and
  # the external infra-shared-network (so infra-prometheus can scrape its
  # 127.0.0.1-free metrics port). Config comes from .env; the vars below override
  # it for in-container networking. Metrics ports are NOT published to the host —
  # zero-inbound (ADR-006) is preserved.
  #
  # The *_PORT vars in .env are HOST bindings and may be remapped to dodge a
  # conflict; inside the network each service always listens on its stock port,
  # so they are pinned here rather than inherited from .env.
  producers:
    image: ${AI_RADAR_PRODUCERS_IMAGE:-ghcr.io/nplus-father/ai-radar-producers:latest}
    container_name: ai-radar-producers
    env_file: [.env]
    environment: &app-env
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-airadar}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_MGMT_PORT: "15672"
      METRICS_BIND: 0.0.0.0
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      flyway: { condition: service_completed_successfully }
    restart: unless-stopped
    networks: [default, infra-shared]

  enricher:
    image: ${AI_RADAR_ENRICHER_IMAGE:-ghcr.io/nplus-father/ai-radar-enricher:latest}
    container_name: ai-radar-enricher
    env_file: [.env]
    environment: *app-env
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      flyway: { condition: service_completed_successfully }
    restart: unless-stopped
    networks: [default, infra-shared]

  digester:
    image: ${AI_RADAR_DIGESTER_IMAGE:-ghcr.io/nplus-father/ai-radar-digester:latest}
    container_name: ai-radar-digester
    env_file: [.env]
    environment: *app-env
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      flyway: { condition: service_completed_successfully }
    restart: unless-stopped
    networks: [default, infra-shared]

  publisher:
    image: ${AI_RADAR_PUBLISHER_IMAGE:-ghcr.io/nplus-father/ai-radar-publisher:latest}
    container_name: ai-radar-publisher
    env_file: [.env]
    environment:
      <<: *app-env
      CONTENT_DIR: /app/content        # host .env points at an absolute host path
    volumes:
      - ./out/content:/app/content     # daily/weekly markdown persists on the host
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      flyway: { condition: service_completed_successfully }
    restart: unless-stopped
    networks: [default, infra-shared]

  # ---- site auto-publisher --------------------------------------------------
  # Syncs the publisher's markdown into the sibling ai-radar-site checkout and
  # pushes it, so GitHub Actions rebuilds the public Astro site
  # (nplus.wiki/ai-radar-site). Keeps the JRE publisher image git-free.
  site-publisher:
    image: alpine/git
    entrypoint: ["/bin/sh", "/scripts/site-publish.sh"]
    volumes:
      - ./out/content:/src:ro
      - ../ai-radar-site:/repo
      - ./config/site-publish.sh:/scripts/site-publish.sh:ro
    environment:
      SITE_GIT_TOKEN: ${SITE_GIT_TOKEN:?set in .env}
      SYNC_INTERVAL_SECONDS: "300"
    depends_on:
      - publisher
    restart: unless-stopped

volumes:
  rabbitmq-data:
  pg-data:

networks:
  # ai-radar's own bridge (auto-created as ai-radar_default) is referenced as
  # `default`; infra-shared-network is created by the nplus-infra stack.
  infra-shared:
    name: infra-shared-network
    external: true
