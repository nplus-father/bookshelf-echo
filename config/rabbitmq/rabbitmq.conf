# The management UI/API is served at the root of its own subdomain
# (https://rabbitmq.nplus.space/, proxied by nplus-infra's nginx), so there is
# no sub-path to declare here.
#
# Tombstone for `management.path_prefix = /rabbitmq`, removed 2026-07-21:
# it was set purely so the UI could be mounted under nplus.space/rabbitmq/,
# but it moved the HTTP API too (/api/queues → /rabbitmq/api/queues). The
# publisher's queue-stats client kept calling the un-prefixed path and 404'd
# every interval for weeks — swallowed into a WARN, snapshot still written,
# dashboard panels quietly empty (#2). Giving the UI its own subdomain removes
# the prefix, and with it that whole class of bug.
#
# If a prefix is ever reintroduced, SnapshotJob.mgmtPrefix's default must move
# with it — note that setting the env var to an empty string does NOT work,
# since Config.str treats blank as absent and falls back to the default.
#
# The file itself is kept (not deleted) because docker-compose mounts it; an
# absent mount source would be recreated as a directory.
